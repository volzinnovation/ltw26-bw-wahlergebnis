name: Election Poll

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 2026-bw-minute-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run election poller with retry
        run: |
          attempt=1
          max_attempts=3
          sleep_seconds=30

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Starting poll attempt $attempt/$max_attempts"
            if python scripts/poll_election.py --election-key 2026-bw; then
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Poll failed after $max_attempts attempts"
              exit 1
            fi

            echo "Poll attempt $attempt failed, waiting ${sleep_seconds}s before retry"
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

      - name: Commit and push updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/2026-bw/latest
          git add data/2026-bw/metadata/municipalities.csv
          git add data/2026-bw/metadata/wahlkreis-status.csv
          git add data/2026-bw/reports/latest_events.csv
          git add data/2026-bw/reports/latest_source_diff.csv
          git add config/2026-bw.json scripts/poll_election.py scripts/poll_election_core.py scripts/poll_ltw26.py
          git commit -m "2026-bw poll $(date -u +"%Y-%m-%dT%H:%M:%SZ")" || exit 0
          git pull --rebase --autostash
          git push
